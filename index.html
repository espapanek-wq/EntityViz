const colors = {"family": "#e8943a", "close friend": "#2dd4bf", "friend": "#5ee5d6", "acquaintance": "#9ca3af", "romantic": "#ef4444", "work": "#fbbf24", "industry": "#3b82f6", "important": "#22c55e", "chess/poker": "#a78bfa", "sports": "#fb923c", "parasocial": "#f472b6", "institution": "#94a3b8", "concept": "#71717a", "other": "#525252"};

// Filter state: which categories are currently selected (highlighted)
const selected = new Set();
// Pinned node — set when user clicks a node; lights up its edges until cleared
let pinnedNode = null;

// Count includes anyone with the category in cat1, cat2, or cat3
function countInCategory(cat) {
  return data.nodes.filter(n => (n.all_categories || []).includes(cat)).length;
}

function nodeInSelected(n) {
  if (selected.size === 0) return true;
  return (n.all_categories || []).some(c => selected.has(c));
}

function linkTouches(link, nodeId) {
  return (link.source.id || link.source) === nodeId ||
         (link.target.id || link.target) === nodeId;
}

function getNeighbors(nodeId) {
  const neighbors = new Set();
  data.links.forEach(l => {
    if ((l.source.id || l.source) === nodeId) neighbors.add(l.target.id || l.target);
    if ((l.target.id || l.target) === nodeId) neighbors.add(l.source.id || l.source);
  });
  return neighbors;
}

function baseLinkOpacity(l) {
  // Weight-1 edges fade into the background; heavier edges visibly more saturated
  if (l.weight === 1) return 0.08;
  return 0.30 + 0.55 * Math.min(1, (l.weight - 2) / 15);
}

function applyFilter() {
  const hasSelection = selected.size > 0;
  const isPinned = pinnedNode !== null;

  if (isPinned) {
    // Pin state takes precedence — light up the pinned node's edges
    const neighbors = getNeighbors(pinnedNode);
    node.attr('opacity', n =>
      (n.id === pinnedNode || neighbors.has(n.id)) ? 1 : 0.1);
    label.attr('opacity', n =>
      (n.id === pinnedNode || neighbors.has(n.id)) ? 1 : 0.1);
    link.attr('opacity', l =>
      linkTouches(l, pinnedNode) ? 0.95 : 0.04)
      .attr('stroke-width', l =>
        linkTouches(l, pinnedNode) ? widthScale(l.weight) + 2.5 : widthScale(l.weight));
  } else if (hasSelection) {
    node.attr('opacity', n => nodeInSelected(n) ? 1 : 0.08);
    label.attr('opacity', n => nodeInSelected(n) ? 1 : 0.08);
    link.attr('opacity', l => {
      const s = data.nodes.find(n => n.id === (l.source.id || l.source));
      const t = data.nodes.find(n => n.id === (l.target.id || l.target));
      const inSel = nodeInSelected(s) && nodeInSelected(t);
      return inSel ? baseLinkOpacity(l) : 0.02;
    }).attr('stroke-width', l => widthScale(l.weight));
  } else {
    node.attr('opacity', 1);
    label.attr('opacity', 1);
    link.attr('opacity', l => baseLinkOpacity(l))
        .attr('stroke-width', l => widthScale(l.weight));
  }
}

// Build clickable legend
const legend = document.getElementById('legend');
const legendRows = {};
categoryOrder.forEach(c => {
  // Count anyone with this category in any slot (primary, secondary, tertiary)
  const count = countInCategory(c);
  // Hide empty categories
  if (count === 0) return;
  const row = document.createElement('div');
  row.className = 'legend-row';
  row.innerHTML = `<span class="legend-dot" style="background:${colors[c]}"></span>` +
                  `<span class="legend-label">${c} (${count})</span>`;
  row.addEventListener('click', () => {
    if (selected.has(c)) {
      selected.delete(c);
      row.classList.remove('active');
    } else {
      selected.add(c);
      row.classList.add('active');
    }
    applyFilter();
  });
  legend.appendChild(row);
  legendRows[c] = row;
});

  .domain([2, d3.max(data.nodes, d => d.mentions)])

// Max weight in this dataset is ~33 (Matisse↔Troy)
const widthScale = d => {
  if (d === 1) return 0.3;
  if (d <= 8) return 1.0 + (d - 2) * 1.5;       // 2→1.0, 3→2.5, 4→4.0, 6→7.0, 8→10.0

  .attr('stroke', d => {
    const srcNode = data.nodes.find(n => n.id === (d.source.id || d.source));

  .attr('stroke-width', d => widthScale(d.weight))
  .attr('opacity', d => 0.25 + 0.35 * Math.min(1, d.weight / 8))
  .on('mouseover', function(event, d) {
    const src = d.source.id || d.source;

    // Toggle pin: clicking the same node again unpins
    pinnedNode = (pinnedNode === d.id) ? null : d.id;
    applyFilter();
  })
  .on('mouseover', function(event, d) {
    const cats_html = (d.category_raw_all || [d.category_raw])
      .filter(c => c).join(', ');
    tooltip.style('opacity', 1)
      .html(`Mentions: ${d.mentions}<br>Sentiment: ${d.sentiment > 0 ? '+' : ''}${d.sentiment}<br>Categories: ${cats_html}`);
    // Hover preview — only if nothing is pinned
    if (pinnedNode !== null) return;
    const neighbors = getNeighbors(d.id);
    node.attr('opacity', n => n.id === d.id || neighbors.has(n.id) ? 1 : 0.15);
    link.attr('opacity', l => linkTouches(l, d.id) ? 0.95 : 0.04)
        .attr('stroke-width', l =>
          linkTouches(l, d.id) ? widthScale(l.weight) + 2.5 : widthScale(l.weight));
    label.attr('opacity', n => n.id === d.id || neighbors.has(n.id) ? 1 : 0.2);
  })
  .on('mousemove', e => tooltip.style('left', (e.pageX + 12) + 'px').style('top', (e.pageY + 12) + 'px'))
  .on('mouseout', function() {
    tooltip.style('opacity', 0);
    applyFilter();
  });

// Labels
const label = g.append('g').selectAll('text')
  .data(data.nodes).join('text')
  .attr('class', d => 'node-label' + (d.mentions >= 15 ? ' big' : ''))
  .attr('text-anchor', 'middle')
  .attr('dy', d => -(sizeScale(d.mentions) + 4))
  .text(d => d.id);

sim.on('tick', () => {
  link.attr('d', d => {
    const dx = d.target.x - d.source.x;
    const dy = d.target.y - d.source.y;
    const dr = Math.sqrt(dx * dx + dy * dy) * 2;
    return `M${d.source.x},${d.source.y}A${dr},${dr} 0 0,1 ${d.target.x},${d.target.y}`;
  });
  node.attr('cx', d => d.x).attr('cy', d => d.y);
  label.attr('x', d => d.x).attr('y', d => d.y);
});
</script>
</body>
</html>
